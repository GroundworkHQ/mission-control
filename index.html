.field label{display:block;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-bottom:6px;}
.field input,.field select,.field textarea{width:100%;background:rgba(0,0,0,.35);border:1px solid var(--border);border-radius:7px;padding:10px 12px;color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:14px;outline:none;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--cyan);box-shadow:0 0 12px rgba(63,224,255,.15);}

.btn.go{background:var(--amber);color:#1a1206;border-color:var(--amber);font-weight:600;box-shadow:0 0 14px rgba(255,178,74,.3);width:100%;} .btn.go:hover{box-shadow:0 0 22px rgba(255,178,74,.6);}
.sync{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--dim);letter-spacing:.08em;text-align:center;margin-top:26px;} .sync .ok{color:#3fe0a0;}
.authwrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}

.authwrap code{font-family:'IBM Plex Mono',monospace;color:var(--cyan);background:rgba(63,224,255,.08);padding:1px 5px;border-radius:4px;font-size:12px;}
.mc.light{ --bg:#eef1f6; --panel:#ffffff; --panel2:#e9eef5; --border:#d3dbe7; --text:#1b2433; --dim:#6b7789; --amber:#c9760f; --cyan:#0e8fb0; background-image:none; }
.mc.light::before{ background-image:linear-gradient(rgba(20,40,80,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(20,40,80,.045) 1px,transparent 1px); }
.mc.light .scan{ display:none; }
.mc.light header{ background:rgba(255,255,255,.92); box-shadow:0 1px 0 var(--border),0 2px 10px rgba(20,30,50,.05); }
.mc.light .title,.mc.light .title b,.mc.light .clock .t,.mc.light .stat .n,.mc.light .eyebrow,.mc.light .nominal{ text-shadow:none; }
.mc.light .stat,.mc.light .alerts,.mc.light .tabs,.mc.light .card,.mc.light .task{ box-shadow:0 1px 2px rgba(20,30,50,.06); }
.mc.light .stat::before,.mc.light .fill,.mc.light .check.on,.mc.light .add,.mc.light .tab.active,.mc.light .btn.go{ box-shadow:none; }
.mc.light .stat .n{ color:var(--text); }
.mc.light .tab.active{ background:rgba(14,143,176,.13); border-color:rgba(14,143,176,.42); }
.mc.light .track{ background:rgba(20,30,50,.07); }
.mc.light .field input,.mc.light .field select,.mc.light .field textarea,.mc.light .qarow input,.mc.light .tfilter select{ background:#ffffff; }
.mc.light .modal{ background:#ffffff; }
.mc.light .pill,.mc.light .pri{ color:var(--text)!important; }
.mc.light .chip{ color:#c01a2b!important; }
.mc.light .nominal{ color:#127a4a; }
.mc.light .over{ color:#cf1a2b; border-color:rgba(207,26,43,.4); }
.mc.light .over.soon{ color:#b9740a; border-color:rgba(185,116,10,.4); }
.mc.light .tdue.od{ color:#cf1a2b; } .mc.light .tdue.today{ color:#b9740a; }
.mc.light .tchip{ color:#0e8fb0; background:rgba(14,143,176,.1); border-color:rgba(14,143,176,.3); }
.mc.light .note{ background:rgba(14,143,176,.07); border-color:rgba(14,143,176,.25); color:#0b5a70; } .mc.light .note b{ color:#073f4f; }
.mc.light .sync .ok{ color:#127a4a; }
.mc.light .add,.mc.light .btn.go{ color:#ffffff; }
.mc.light .add:hover,.mc.light .btn.go:hover{ box-shadow:0 2px 10px rgba(201,118,15,.35); }
.mc.light .linkbtn{ color:#0e8fb0; background:rgba(14,143,176,.08); border-color:rgba(14,143,176,.28); }
.mc.light .linkbtn:hover{ background:rgba(14,143,176,.16); }
@media (max-width:640px){.title{font-size:17px;}.eyebrow{font-size:8px;letter-spacing:.14em;}.two{grid-template-columns:1fr;}}
`;

function App() {
  const [phase, setPhase] = useState("checking"); // checking | setup | auth | app
  const [session, setSession] = useState(null);

  useEffect(() => {
    if (!configured) { setPhase("setup"); return; }
    sb.auth.getSession().then(({ data }) => { setSession(data.session); setPhase(data.session ? "app" : "auth"); });
    const { data: sub } = sb.auth.onAuthStateChange((_e, s) => { setSession(s); setPhase(s ? "app" : "auth"); });
    return () => sub.subscription.unsubscribe();
  }, []);

  if (phase === "checking") return <div className="mc"><div className="scan" /><div style={{ paddingTop: 120, textAlign: "center", fontFamily: "monospace", color: "#62748c" }}>· · · ESTABLISHING UPLINK · · ·</div></div>;
  if (phase === "setup") return <SetupScreen />;
  if (phase === "auth") return <AuthScreen />;
  return <MissionControl session={session} />;
}

function SetupScreen() {
  return (
    <div className="mc"><style>{css}</style><div className="scan" /><div className="authwrap"><div className="modal">
      <h2>Setup Required</h2>
      <p className="sub">Open <code>index.html</code> and paste your Supabase project URL and anon key into the config block near the top (from <b>Project Settings → API</b>). Then create the table with the SQL from the setup notes, and reload.</p>
    </div></div></div>
  );
}

function AuthScreen() {
  const [email, setEmail] = useState("");
  const [sent, setSent] = useState(false);
  const [err, setErr] = useState("");
  const send = async () => {
    if (!email.trim()) return;
    const { error } = await sb.auth.signInWithOtp({ email: email.trim(), options: { emailRedirectTo: window.location.href.split("#")[0] } });
    if (error) setErr(error.message); else setSent(true);
  };
  return (
    <div className="mc"><style>{css}</style><div className="scan" /><div className="authwrap"><div className="modal">
      <div className="eyebrow" style={{ marginBottom: 8 }}>Innovative Blockchain Solutions</div><h2>Mission Control</h2>
      {sent ? (
        <p className="sub">Magic link sent to <code>{email}</code>. Open it on this device to sign in.</p>
      ) : (<>
        <p className="sub">Enter your email and we'll send a one-tap sign-in link.</p>
        <div className="field"><label>Email</label><input type="email" value={email} onChange={(e) => setEmail(e.target.value)} onKeyDown={(e) => e.key === "Enter" && send()} placeholder="you@yourcompany.com" autoFocus /></div>
        {err && <p className="sub" style={{ color: "#ff8593" }}>{err}</p>}
        <button className="btn go" onClick={send}>Send magic link</button>
      </>)}
    </div></div></div>
  );
}

function MissionControl({ session }) {
  const userId = session.user.id;
  const [data, setData] = useState({ projects: [], tasks: [], domains: [], credentials: [] });
  const [loading, setLoading] = useState(true);
  const [tab, setTab] = useState("proj");
  const [modal, setModal] = useState(null);
  const [now, setNow] = useState(new Date());
  const [confirmId, setConfirmId] = useState(null);
  const [savedAt, setSavedAt] = useState(null);
  const [taskInput, setTaskInput] = useState("");
  const [taskFilter, setTaskFilter] = useState("");
  const [clearConfirm, setClearConfirm] = useState(false);
  const fileRef = useRef(null);
  const [theme, setTheme] = useState(() => { try { return localStorage.getItem("mc-theme") || "dark"; } catch (e) { return "dark"; } });
  const toggleTheme = () => { const t = theme === "dark" ? "light" : "dark"; setTheme(t); try { localStorage.setItem("mc-theme", t); } catch (e) {} };

  useEffect(() => {
    let alive = true;
    (async () => {
      try {
        const remote = await loadRemote(userId);
        if (!alive) return;
        if (remote) { const m = migrate(remote); setData(m); }
        else { setData(SEED); await saveRemote(userId, SEED); }
      } catch (e) { console.error(e); }
      setLoading(false);
    })();
    return () => { alive = false; };
  }, [userId]);
  useEffect(() => { const t = setInterval(() => setNow(new Date()), 1000); return () => clearInterval(t); }, []);

  const persist = useCallback((next) => { setData(next); saveRemote(userId, next); setSavedAt(Date.now()); }, [userId]);
  const keyFor = (type) => ({ project:"projects", task:"tasks", domain:"domains", cred:"credentials" }[type]);
  const saveItem = (type, item) => { const key=keyFor(type); const list=data[key]; const exists=list.some((x)=>x.id===item.id); persist({ ...data, [key]: exists?list.map((x)=>x.id===item.id?item:x):[...list,item] }); setModal(null); };
  const remove = (type, id) => { const key=keyFor(type); persist({ ...data, [key]: data[key].filter((x)=>x.id!==id) }); setConfirmId(null); };
  const toggleTask = (id) => persist({ ...data, tasks: data.tasks.map((t)=>t.id===id?{...t,done:!t.done}:t) });
  const addQuickTask = () => { const text=taskInput.trim(); if(!text)return; const project=taskFilter&&taskFilter!=="__none"?taskFilter:""; persist({ ...data, tasks:[...data.tasks,{id:uid(),text,done:false,priority:"medium",due:"",notes:"",project}] }); setTaskInput(""); };
  const viewProjectTasks = (pid) => { setTaskFilter(pid); setTab("task"); };
  const clearCompleted = () => { const inScope=(t)=>!taskFilter?true:taskFilter==="__none"?!t.project:t.project===taskFilter; persist({ ...data, tasks: data.tasks.filter((t)=>!(t.done&&inScope(t))) }); setClearConfirm(false); };
  const exportJSON = () => { const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"}); const a=document.createElement("a"); a.href=window.URL.createObjectURL(blob); a.download="mission-control-"+todayStr()+".json"; a.click(); };
  const importJSON = (file) => { const r=new FileReader(); r.onload=()=>{ try{ persist(migrate(JSON.parse(r.result))); }catch(e){ alert("Could not read that file."); } }; r.readAsText(file); };

  const projects = [...data.projects].sort((a,b)=>(PSORT[a.status]??0)-(PSORT[b.status]??0)||a.name.localeCompare(b.name));
  const domains = [...data.domains].sort((a,b)=>domScore(b)-domScore(a));
  const tasks = [...data.tasks].sort((a,b)=>(a.done!==b.done?(a.done?1:-1):taskUrgency(b)-taskUrgency(a)));
  const projName = (id) => (data.projects.find((p)=>p.id===id)||{}).name;
  const visibleTasks = tasks.filter((t)=>!taskFilter?true:taskFilter==="__none"?!t.project:t.project===taskFilter);
  const doneVisibleCount = visibleTasks.filter((t)=>t.done).length;

  const alerts=[];
  const odTasks=data.tasks.filter((t)=>!t.done&&t.due&&t.due<todayStr()).length;
  const todayTasks=data.tasks.filter((t)=>!t.done&&t.due===todayStr()).length;
  const expired=data.domains.filter((d)=>{const a=domainAlert(d);return a&&a.kind==="expired";}).length;
  const expiring=data.domains.filter((d)=>{const a=domainAlert(d);return a&&a.kind==="soon";}).length;
  const down=data.domains.filter((d)=>d.status==="down").length;
  if(odTasks)alerts.push({t:`${odTasks} to-do${odTasks>1?"s":""} overdue`,sev:"hi",go:"task"});
  if(expired)alerts.push({t:`${expired} domain${expired>1?"s":""} expired`,sev:"hi",go:"dom"});
  if(down)alerts.push({t:`${down} site${down>1?"s":""} down`,sev:"hi",go:"dom"});
  if(expiring)alerts.push({t:`${expiring} expiring \u226430d`,sev:"med",go:"dom"});
  if(todayTasks)alerts.push({t:`${todayTasks} due today`,sev:"med",go:"task"});

  const statSets={
    proj:[{n:data.projects.length,l:"Total",c:"#d6e2ee"},{n:data.projects.filter((p)=>p.status==="active").length,l:"Active",c:PSTATUS.active.color},{n:data.projects.filter((p)=>p.status==="hold").length,l:"On Hold",c:PSTATUS.hold.color},{n:data.projects.filter((p)=>p.status==="done").length,l:"Done",c:PSTATUS.done.color}],
    task:[{n:data.tasks.filter((t)=>!t.done).length,l:"Open",c:"#d6e2ee"},{n:todayTasks,l:"Due Today",c:"#ffb24a"},{n:odTasks,l:"Overdue",c:"#ff5d6c"},{n:data.tasks.filter((t)=>t.done).length,l:"Done",c:"#3fe0ff"}],
    dom:[{n:data.domains.length,l:"Total",c:"#d6e2ee"},{n:data.domains.filter((d)=>d.status==="live").length,l:"Live",c:DSTATUS.live.color},{n:expiring,l:"Expiring",c:"#ffb24a"},{n:expired,l:"Expired",c:"#ff5d6c"},{n:down,l:"Down",c:DSTATUS.down.color}],
    reg:[{n:data.credentials.length,l:"Entries",c:"#d6e2ee"},{n:data.credentials.filter((c)=>(c.location||"").toLowerCase().includes("roboform")).length,l:"In RoboForm",c:"#3fe0ff"},{n:data.credentials.filter((c)=>c.location&&!(c.location||"").toLowerCase().includes("roboform")).length,l:"Elsewhere",c:"#7b8aa0"},{n:data.credentials.filter((c)=>c.url).length,l:"With URL",c:"#3fe0a0"}],
  };

  const pad=(n)=>String(n).padStart(2,"0");
  const timeStr=`${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  const dateStr=now.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric",year:"numeric"}).toUpperCase();
  const newType={proj:"project",task:"task",dom:"domain",reg:"cred"}[tab];
  const newLabel={proj:"New Project",task:"New To-Do",dom:"New Domain",reg:"New Entry"}[tab];

  return (
    <div className={"mc" + (theme === "light" ? " light" : "")}>
      <style>{css}</style>
      <div className="scan" />
      <header><div className="hbar">
        <div className="brand"><span className="dot" /><div className="lockup"><span className="eyebrow">Innovative Blockchain Solutions</span><span className="title">Mission <b>Control</b></span></div></div>
        <div className="hud-right">
          <div className="clock"><div className="t mono">{timeStr} <span style={{ color:"var(--dim)" }}>LOCAL</span></div><div>{dateStr}</div></div>
          <div className="hbtns">
            <button className="hbtn" onClick={toggleTheme}>{theme==="dark"?"☀ Light":"☾ Dark"}</button>
            <button className="hbtn" onClick={exportJSON}>⤓ Export</button>
            <button className="hbtn" onClick={() => fileRef.current && fileRef.current.click()}>⤒ Import</button>
            <button className="hbtn" onClick={() => sb.auth.signOut()}>Sign out</button>
            <input ref={fileRef} type="file" accept="application/json" style={{ display:"none" }} onChange={(e) => e.target.files[0] && importJSON(e.target.files[0])} />
          </div>
        </div>
      </div></header>

      <div className="wrap">
        {!loading && (
          <div className="alerts"><span className="lab">Attention</span>
            {alerts.length===0 ? <span className="nominal">◇ ALL SYSTEMS NOMINAL</span> : alerts.map((a,i)=>(
              <button key={i} className="chip" onClick={()=>{ if(a.go==="task")setTaskFilter(""); setTab(a.go); }} style={{color:"#ff8593",borderColor:"rgba(255,93,108,.45)",background:"rgba(255,93,108,.1)"}}>{a.sev==="hi"?"▲":"◆"} {a.t}</button>
            ))}
          </div>
        )}
        <div className="stats">{statSets[tab].map((s,i)=>(<div className="stat" key={i} style={{ "--c":s.c }}><div className="n">{s.n}</div><div className="l">{s.l}</div></div>))}</div>
        <div className="bar">
          <div className="tabs">
            <button className={`tab ${tab==="proj"?"active":""}`} onClick={()=>setTab("proj")}><span className="ic">▦</span>Projects <span className="c">{data.projects.length}</span></button>
            <button className={`tab ${tab==="task"?"active":""}`} onClick={()=>setTab("task")}><span className="ic">✓</span>To-Dos <span className="c">{data.tasks.filter((t)=>!t.done).length}</span></button>
            <button className={`tab ${tab==="dom"?"active":""}`} onClick={()=>setTab("dom")}><span className="ic">◎</span>Domains <span className="c">{data.domains.length}</span></button>
            <button className={`tab ${tab==="reg"?"active":""}`} onClick={()=>setTab("reg")}><span className="ic">🗝</span>Registry <span className="c">{data.credentials.length}</span></button>
          </div>
          <button className="add" onClick={()=>setModal({type:newType,item:null})}>+ {newLabel}</button>
        </div>

        {loading ? <div className="empty"><p>· · · SYNCING · · ·</p></div>
        : tab==="proj" ? (projects.length===0 ? <div className="empty"><p>NO PROJECTS YET</p><button className="add" onClick={()=>setModal({type:"project",item:null})}>+ Add First Project</button></div>
          : <div className="grid">{projects.map((p,i)=>{ const rel=data.tasks.filter((t)=>t.project===p.id); return <ProjectCard key={p.id} p={p} i={i} openCount={rel.filter((t)=>!t.done).length} doneCount={rel.filter((t)=>t.done).length} onViewTasks={()=>viewProjectTasks(p.id)} onEdit={()=>setModal({type:"project",item:p})} onDelete={()=>confirmId===p.id?remove("project",p.id):setConfirmId(p.id)} confirming={confirmId===p.id} onCancelConfirm={()=>setConfirmId(null)} />; })}</div>)
        : tab==="task" ? (<>
            <div className="qarow"><input value={taskInput} onChange={(e)=>setTaskInput(e.target.value)} onKeyDown={(e)=>e.key==="Enter"&&addQuickTask()} placeholder={taskFilter&&taskFilter!=="__none"?`Quick add to "${projName(taskFilter)}" — Enter`:"Quick capture a to-do — type and hit Enter"} /><button className="add" onClick={addQuickTask}>Add</button></div>
            <div className="tfilter"><select value={taskFilter} onChange={(e)=>{setTaskFilter(e.target.value);setClearConfirm(false);}}><option value="">All to-dos</option><option value="__none">Unassigned</option>{data.projects.map((p)=><option key={p.id} value={p.id}>{p.name}</option>)}</select>{doneVisibleCount>0 && <button className={`mini ${clearConfirm?"confirm":""}`} onClick={()=>clearConfirm?clearCompleted():setClearConfirm(true)}>{clearConfirm?`Confirm — clear ${doneVisibleCount}?`:`Clear completed (${doneVisibleCount})`}</button>}</div>
            {visibleTasks.length===0 ? <div className="empty"><p>{taskFilter?"NOTHING HERE — CAPTURE ONE ABOVE":"NO TO-DOS — CAPTURE ONE ABOVE"}</p></div>
              : <div className="grid-list">{visibleTasks.map((t,i)=>(<TaskRow key={t.id} t={t} i={i} projectName={projName(t.project)} onToggle={()=>toggleTask(t.id)} onEdit={()=>setModal({type:"task",item:t})} onDelete={()=>confirmId===t.id?remove("task",t.id):setConfirmId(t.id)} confirming={confirmId===t.id} onCancelConfirm={()=>setConfirmId(null)} />))}</div>}
          </>)
        : tab==="dom" ? (domains.length===0 ? <div className="empty"><p>NO DOMAINS REGISTERED</p><button className="add" onClick={()=>setModal({type:"domain",item:null})}>+ Add First Domain</button></div>
          : <div className="grid">{domains.map((d,i)=>(<DomainCard key={d.id} d={d} i={i} onEdit={()=>setModal({type:"domain",item:d})} onDelete={()=>confirmId===d.id?remove("domain",d.id):setConfirmId(d.id)} confirming={confirmId===d.id} onCancelConfirm={()=>setConfirmId(null)} />))}</div>)
        : (<>
            <div className="note"><span>🔒</span><span><b>References only — no secrets stored here.</b> This logs which service, the account, and where the real password/key lives. Keep actual secrets in RoboForm.</span></div>
            {data.credentials.length===0 ? <div className="empty"><p>NO REGISTRY ENTRIES</p><button className="add" onClick={()=>setModal({type:"cred",item:null})}>+ Add First Entry</button></div>
              : <div className="grid">{data.credentials.map((c,i)=>(<CredCard key={c.id} c={c} i={i} onEdit={()=>setModal({type:"cred",item:c})} onDelete={()=>confirmId===c.id?remove("cred",c.id):setConfirmId(c.id)} confirming={confirmId===c.id} onCancelConfirm={()=>setConfirmId(null)} />))}</div>}
          </>)}

        <div className="sync">● <span className="ok">SYNCED TO SUPABASE</span> — {session.user.email}{savedAt?" · last write "+new Date(savedAt).toLocaleTimeString():""}</div>
      </div>

      {modal && <Editor type={modal.type} item={modal.item} projects={data.projects} onClose={()=>setModal(null)} onSave={(it)=>saveItem(modal.type,it)} />}
    </div>
  );
}

function ProjectCard({ p, i, openCount, doneCount, onViewTasks, onEdit, onDelete, confirming, onCancelConfirm }) {
  const st = PSTATUS[p.status] || PSTATUS.active;
  return (<div className="card" style={{ animationDelay:`${i*55}ms` }}>
    <div className="top"><div className="name">{p.name}</div><div className="badges"><span className="pill" style={{ color:st.color, background:st.color+"16", border:`1px solid ${st.color}3a` }}><span>{st.glyph}</span>{st.label}</span></div></div>
    {p.notes && <div className="pdesc">{p.notes}</div>}
    {p.link && <a className="linkbtn" href={p.link} target="_blank" rel="noreferrer" title={p.link}>↗ Open</a>}
    <div className="cardfoot">
      <button className="psum" onClick={onViewTasks}>{openCount+doneCount===0?"▢ No to-dos yet — add some":<><b>{openCount}</b> open{doneCount?` · ${doneCount} done`:""} →</>}</button>
      <CardActions onEdit={onEdit} onDelete={onDelete} confirming={confirming} onCancelConfirm={onCancelConfirm} />
    </div>
  </div>);
}
function TaskRow({ t, i, projectName, onToggle, onEdit, onDelete, confirming, onCancelConfirm }) {
  const pr = PRIORITY[t.priority] || PRIORITY.low;
  const overdue = !t.done && t.due && t.due < todayStr(); const isToday = !t.done && t.due === todayStr();
  return (<div className={`task ${t.done?"done":""} ${overdue?"flag":""}`} style={{ animationDelay:`${i*35}ms` }}>
    <button className={`check ${t.done?"on":""}`} onClick={onToggle}>{t.done?"✓":""}</button>
    <div className="tbody"><div className="ttext">{t.text}</div><div className="tmeta"><span className="tdot" style={{ background:pr.color, color:pr.color }} />{t.due && <span className={`tdue ${overdue?"od":isToday?"today":""}`}>{overdue?"OVERDUE · "+fmtDate(t.due):isToday?"TODAY":fmtDate(t.due)}</span>}{projectName && <span className="tchip">◇ {projectName}</span>}</div></div>
    <div className="tacts"><button className="mini" onClick={onEdit}>Edit</button><button className={`mini del ${confirming?"confirm":""}`} onClick={onDelete}>{confirming?"Confirm?":"Del"}</button>{confirming && <button className="mini" onClick={onCancelConfirm}>Cancel</button>}</div>
  </div>);
}
function DomainCard({ d, i, onEdit, onDelete, confirming, onCancelConfirm }) {
  const st = DSTATUS[d.status] || DSTATUS.parked; const alert = domainAlert(d);
  return (<div className={`card ${alert?"flag":""}`} style={{ animationDelay:`${i*55}ms` }}>
    <div className="top"><div className="name">{d.name}</div><div className="badges"><span className="pill" style={{ color:st.color, background:st.color+"16", border:`1px solid ${st.color}3a` }}><span>{st.glyph}</span>{st.label}</span></div></div>
    {d.purpose && <div className="row" style={{ marginTop:12 }}><span className="k">Purpose</span><span className="v">{d.purpose}</span></div>}
    {(d.registrar||d.host) && <div className="row"><span className="k">Registrar</span><span className="v">{d.registrar||"—"}{d.host && <span style={{ color:"var(--dim)" }}>  ·  host: {d.host}</span>}</span></div>}
    {d.expiry && <div className="row"><span className="k">Expires</span><span className="v">{fmtDate(d.expiry)}{alert&&alert.kind==="expired"&&<span className="over" style={{ marginLeft:8 }}>EXPIRED {Math.abs(alert.days)}d AGO</span>}{alert&&alert.kind==="soon"&&<span className="over soon" style={{ marginLeft:8 }}>{alert.days===0?"TODAY":`${alert.days}d LEFT`}</span>}</span></div>}
    {d.notes && <div className="row"><span className="k">Notes</span><span className="v" style={{ color:"var(--dim)" }}>{d.notes}</span></div>}
    {d.link && <a className="linkbtn" href={d.link} target="_blank" rel="noreferrer" title={d.link}>↗ Open</a>}
    <CardActions onEdit={onEdit} onDelete={onDelete} confirming={confirming} onCancelConfirm={onCancelConfirm} />
  </div>);
}
function CredCard({ c, i, onEdit, onDelete, confirming, onCancelConfirm }) {
  return (<div className="card" style={{ animationDelay:`${i*55}ms` }}>
    <div className="top"><div className="name">{c.service}</div>{c.location && <span className="pill" style={{ color:"#3fe0ff", background:"rgba(63,224,255,.12)", border:"1px solid rgba(63,224,255,.3)" }}>🗝 {c.location}</span>}</div>
    {c.account && <div className="row" style={{ marginTop:12 }}><span className="k">Account</span><span className="v mono">{c.account}</span></div>}
    {c.url && <a className="linkbtn" href={c.url} target="_blank" rel="noreferrer" title={c.url}>↗ Open login</a>}
    {c.notes && <div className="row"><span className="k">Notes</span><span className="v" style={{ color:"var(--dim)" }}>{c.notes}</span></div>}
    <CardActions onEdit={onEdit} onDelete={onDelete} confirming={confirming} onCancelConfirm={onCancelConfirm} />
  </div>);
}
function CardActions({ onEdit, onDelete, confirming, onCancelConfirm }) {
  return (<div className="actions"><button className="mini" onClick={onEdit}>Edit</button><button className={`mini del ${confirming?"confirm":""}`} onClick={onDelete}>{confirming?"Confirm?":"Delete"}</button>{confirming && <button className="mini" onClick={onCancelConfirm}>Cancel</button>}</div>);
}

function Editor({ type, item, projects, onClose, onSave }) {
  const blank = {
    project:{ id:uid(), name:"", status:"active", notes:"", link:"" },
    task:{ id:uid(), text:"", done:false, priority:"medium", due:"", notes:"", project:"" },
    domain:{ id:uid(), name:"", purpose:"", registrar:"", host:"", expiry:"", status:"live", link:"", notes:"" },
    cred:{ id:uid(), service:"", account:"", location:"RoboForm", url:"", notes:"" },
  };
  const [f, setF] = useState(item ? { ...item } : blank[type]);
  const set = (k,v) => setF((p)=>({ ...p, [k]:v }));
  const valid = type==="project"?f.name.trim():type==="task"?f.text.trim():type==="domain"?f.name.trim():f.service.trim();
  const heading = { project:"Project", task:"To-Do", domain:"Domain / Site", cred:"Registry Entry" }[type];
  return (<div className="scrim" onClick={onClose}><div className="modal" onClick={(e)=>e.stopPropagation()}>
    <h2>{item?"Edit":"New"} {heading}</h2>
    {type==="project"&&(<><div className="field"><label>Project Name</label><input value={f.name} onChange={(e)=>set("name",e.target.value)} placeholder="e.g. Series A raise" autoFocus /></div>
      <div className="field"><label>Status</label><select value={f.status} onChange={(e)=>set("status",e.target.value)}>{PSTATUS_ORDER.map((k)=><option key={k} value={k}>{PSTATUS[k].label}</option>)}</select></div>
      <div className="field"><label>Where it stands</label><textarea value={f.notes} onChange={(e)=>set("notes",e.target.value)} placeholder="A line or two on the current state" /></div>
      <div className="field"><label>Link</label><input value={f.link} onChange={(e)=>set("link",e.target.value)} placeholder="https://" /></div></>)}
    {type==="task"&&(<><div className="field"><label>To-Do</label><input value={f.text} onChange={(e)=>set("text",e.target.value)} placeholder="What needs doing?" autoFocus /></div>
      <div className="two"><div className="field"><label>Priority</label><select value={f.priority} onChange={(e)=>set("priority",e.target.value)}>{PRIORITY_ORDER.map((k)=><option key={k} value={k}>{PRIORITY[k].label} — {k}</option>)}</select></div><div className="field"><label>Due</label><input type="date" value={f.due} onChange={(e)=>set("due",e.target.value)} /></div></div>
      <div className="field"><label>Project (optional)</label><select value={f.project} onChange={(e)=>set("project",e.target.value)}><option value="">— None —</option>{projects.map((p)=><option key={p.id} value={p.id}>{p.name}</option>)}</select></div>
      <div className="field"><label>Notes</label><textarea value={f.notes} onChange={(e)=>set("notes",e.target.value)} /></div></>)}
    {type==="domain"&&(<><div className="field"><label>Domain / Site</label><input value={f.name} onChange={(e)=>set("name",e.target.value)} placeholder="e.g. app.groundworkhq.com" autoFocus /></div>
      <div className="field"><label>Purpose</label><input value={f.purpose} onChange={(e)=>set("purpose",e.target.value)} placeholder="e.g. Production app" /></div>
      <div className="two"><div className="field"><label>Registrar</label><input value={f.registrar} onChange={(e)=>set("registrar",e.target.value)} placeholder="e.g. Cloudflare" /></div><div className="field"><label>Host / Deploy</label><input value={f.host} onChange={(e)=>set("host",e.target.value)} placeholder="e.g. Vercel, AWS" /></div></div>
      <div className="two"><div className="field"><label>Status</label><select value={f.status} onChange={(e)=>set("status",e.target.value)}>{DSTATUS_ORDER.map((k)=><option key={k} value={k}>{DSTATUS[k].label}</option>)}</select></div><div className="field"><label>Expiry / Renewal</label><input type="date" value={f.expiry} onChange={(e)=>set("expiry",e.target.value)} /></div></div>
      <div className="field"><label>Link</label><input value={f.link} onChange={(e)=>set("link",e.target.value)} placeholder="https://" /></div>
      <div className="field"><label>Notes</label><textarea value={f.notes} onChange={(e)=>set("notes",e.target.value)} placeholder="DNS, SSL, owner, etc." /></div></>)}
    {type==="cred"&&(<><div className="field"><label>Service</label><input value={f.service} onChange={(e)=>set("service",e.target.value)} placeholder="e.g. GitHub, Stripe, AWS" autoFocus /></div>
      <div className="field"><label>Account / Username</label><input value={f.account} onChange={(e)=>set("account",e.target.value)} placeholder="email or handle" /></div>
      <div className="field"><label>Where the secret lives</label><input value={f.location} onChange={(e)=>set("location",e.target.value)} placeholder="e.g. RoboForm, .env file" /></div>
      <div className="field"><label>URL</label><input value={f.url} onChange={(e)=>set("url",e.target.value)} placeholder="https://" /></div>
      <div className="field"><label>Notes</label><textarea value={f.notes} onChange={(e)=>set("notes",e.target.value)} placeholder="MFA method, rotation date, etc." /></div></>)}
    <div className="mfoot"><button className="btn ghost" onClick={onClose}>Cancel</button><button className="btn go" disabled={!valid} style={{ opacity:valid?1:0.4, width:"auto" }} onClick={()=>valid&&onSave(f)}>{item?"Save":"Add"}</button></div>
  </div></div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
