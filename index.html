function migrate(d) {
  const pmap = { ontrack:"live", atrisk:"dev", blocked:"dev", backlog:"hold", done:"live", active:"dev", live:"live", dev:"dev", hold:"hold" };
  const projects = (d.projects||[]).map((p)=>{ const status=pmap[p.status]||"dev"; const extra=[]; if(p.deadline)extra.push("Due "+p.deadline); if(p.nextAction)extra.push("Next: "+p.nextAction); const notes=[p.notes,...extra].filter(Boolean).join(" · "); const links = Array.isArray(p.links) ? p.links.filter((l)=>l&&l.url).map((l)=>({label:l.label||"",url:l.url})) : (p.link ? [{label:"",url:p.link}] : []); return { id:p.id||uid(), name:p.name||"Untitled", status, notes, links, parent:p.parent||"" }; });
  const tasks = (d.tasks||[]).map((t)=>({ id:t.id||uid(), text:t.text||"", done:!!t.done, priority:t.priority||"medium", due:t.due||"", notes:t.notes||"", project:t.project||"" }));
  const finance = d.finance && typeof d.finance==="object" ? { cash:(d.finance.cash??null), burn:(d.finance.burn??null), updated:d.finance.updated||"" } : { cash:null, burn:null, updated:"" };
  const obligations = (d.obligations||[]).map((o)=>({ id:o.id||uid(), name:o.name||"Untitled", category:OCATEGORY[o.category]?o.category:"other", cadence:OCADENCE[o.cadence]?o.cadence:"annual", due:o.due||"", owner:o.owner||"", link:o.link||"", notes:o.notes||"", done:!!o.done, lastCompleted:o.lastCompleted||"" }));
  const expenses = (d.expenses||[]).map((e)=>({ id:e.id||uid(), vendor:e.vendor||"", category:ECATEGORY[e.category]?e.category:"other", amount:(e.amount===""||e.amount==null)?null:+e.amount, cadence:ECADENCE[e.cadence]?e.cadence:"monthly", renewal:e.renewal||"", owner:e.owner||"", link:e.link||"", notes:e.notes||"", active:e.active!==false }));
  return { projects, tasks, domains:d.domains||[], credentials:d.credentials||[], finance, obligations, expenses };
}

function App() {
  const [phase, setPhase] = useState("checking"); // checking | setup | auth | app
  const [session, setSession] = useState(null);

  useEffect(() => {
    if (!configured) { setPhase("setup"); return; }
    sb.auth.getSession().then(({ data }) => { setSession(data.session); setPhase(data.session ? "app" : "auth"); });
    const { data: sub } = sb.auth.onAuthStateChange((_e, s) => { setSession(s); setPhase(s ? "app" : "auth"); });
    return () => sub.subscription.unsubscribe();
  }, []);

  if (phase === "checking") return <div className="mc"><div className="scan" /><div style={{ paddingTop: 120, textAlign: "center", fontFamily: "monospace", color: "#62748c" }}>· · · ESTABLISHING UPLINK · · ·</div></div>;
  if (phase === "setup") return <SetupScreen />;
  if (phase === "auth") return <AuthScreen />;
  return <MissionControl session={session} />;
}

function SetupScreen() {
  return (
    <div className="mc"><style>{css}</style><div className="scan" /><div className="authwrap"><div className="modal">
      <h2>Setup Required</h2>
      <p className="sub">Open <code>index.html</code> and paste your Supabase project URL and anon key into the config block near the top (from <b>Project Settings → API</b>). Then create the table with the SQL from the setup notes, and reload.</p>
    </div></div></div>
  );
}

function AuthScreen() {
  const [email, setEmail] = useState("");
  const [sent, setSent] = useState(false);
  const [err, setErr] = useState("");
  const send = async () => {
    if (!email.trim()) return;
    const { error } = await sb.auth.signInWithOtp({ email: email.trim(), options: { emailRedirectTo: window.location.href.split("#")[0] } });
    if (error) setErr(error.message); else setSent(true);
  };
  return (
    <div className="mc"><style>{css}</style><div className="scan" /><div className="authwrap"><div className="modal">
      <div className="eyebrow" style={{ marginBottom: 8 }}>Innovative Blockchain Solutions</div><h2>Mission Control</h2>
      {sent ? (
        <p className="sub">Magic link sent to <code>{email}</code>. Open it on this device to sign in.</p>
      ) : (<>
        <p className="sub">Enter your email and we'll send a one-tap sign-in link.</p>
        <div className="field"><label>Email</label><input type="email" value={email} onChange={(e) => setEmail(e.target.value)} onKeyDown={(e) => e.key === "Enter" && send()} placeholder="you@yourcompany.com" autoFocus /></div>
        {err && <p className="sub" style={{ color: "#ff8593" }}>{err}</p>}
        <button className="btn go" onClick={send}>Send magic link</button>
      </>)}
    </div></div></div>
  );
}

function MissionControl({ session }) {
  const userId = session.user.id;
  const [data, setData] = useState({ projects: [], tasks: [], domains: [], credentials: [], finance:{ cash:null, burn:null, updated:"" }, obligations: [], expenses: [] });
  const [loading, setLoading] = useState(true);
  const [tab, setTab] = useState("proj");
  const [modal, setModal] = useState(null);
  const [now, setNow] = useState(new Date());
  const [confirmId, setConfirmId] = useState(null);
  const [savedAt, setSavedAt] = useState(null);
  const [saveStatus, setSaveStatus] = useState("saved");
  const [taskInput, setTaskInput] = useState("");
  const [taskFilter, setTaskFilter] = useState("");
  const [expanded, setExpanded] = useState(() => new Set());
  const [clearConfirm, setClearConfirm] = useState(false);
  const fileRef = useRef(null);
  const [theme, setTheme] = useState(() => { try { return localStorage.getItem("mc-theme") || "dark"; } catch (e) { return "dark"; } });
  const toggleTheme = () => { const t = theme === "dark" ? "light" : "dark"; setTheme(t); try { localStorage.setItem("mc-theme", t); } catch (e) {} };

  useEffect(() => {
    let alive = true;
    (async () => {
      try {
        const remote = await loadRemote(userId);
        if (!alive) return;
        if (remote) { const m = migrate(remote); setData(m); }
        else { setData(SEED); await saveRemote(userId, SEED); }
      } catch (e) { console.error(e); }
      setLoading(false);
    })();
    return () => { alive = false; };
  }, [userId]);
  useEffect(() => { const t = setInterval(() => setNow(new Date()), 1000); return () => clearInterval(t); }, []);

  const persist = useCallback((next) => { setData(next); setSaveStatus("saving"); saveRemote(userId, next).then((ok)=>{ setSaveStatus(ok?"saved":"error"); if(ok) setSavedAt(Date.now()); }); }, [userId]);
  const retrySave = () => { setSaveStatus("saving"); saveRemote(userId, data).then((ok)=>{ setSaveStatus(ok?"saved":"error"); if(ok) setSavedAt(Date.now()); }); };
  const keyFor = (type) => ({ project:"projects", task:"tasks", domain:"domains", cred:"credentials", oblig:"obligations", expense:"expenses" }[type]);
  const saveItem = (type, item) => {
    if(type==="finance"){ persist({ ...data, finance:{ cash:(item.cash===""||item.cash==null)?null:+item.cash, burn:(item.burn===""||item.burn==null)?null:+item.burn, updated:item.updated||todayStr() } }); setModal(null); return; }
    let it=item; if(type==="project") it={ ...item, links:(item.links||[]).filter((l)=>l&&l.url&&l.url.trim()).map((l)=>({label:(l.label||"").trim(),url:l.url.trim()})) };
    if(type==="expense") it={ ...item, amount:(item.amount===""||item.amount==null)?null:+item.amount, active:item.active!==false };
    const key=keyFor(type); const list=data[key]; const exists=list.some((x)=>x.id===it.id); persist({ ...data, [key]: exists?list.map((x)=>x.id===it.id?it:x):[...list,it] }); setModal(null);
  };
  const remove = (type, id) => { const key=keyFor(type); persist({ ...data, [key]: data[key].filter((x)=>x.id!==id) }); setConfirmId(null); };
  const toggleTask = (id) => persist({ ...data, tasks: data.tasks.map((t)=>t.id===id?{...t,done:!t.done}:t) });
  const completeObligation = (id) => persist({ ...data, obligations: data.obligations.map((o)=>{ if(o.id!==id) return o; const c=OCADENCE[o.cadence]||OCADENCE.once; if(c.months>0 && o.due) return {...o, due:addMonths(o.due,c.months), lastCompleted:todayStr()}; return {...o, done:true, lastCompleted:todayStr()}; }) });
  const reopenObligation = (id) => persist({ ...data, obligations: data.obligations.map((o)=>o.id===id?{...o,done:false}:o) });
  const toggleExpense = (id) => persist({ ...data, expenses: data.expenses.map((e)=>e.id===id?{...e,active:!e.active}:e) });
  const addQuickTask = () => { const text=taskInput.trim(); if(!text)return; const project=taskFilter&&taskFilter!=="__none"?taskFilter:""; persist({ ...data, tasks:[...data.tasks,{id:uid(),text,done:false,priority:"medium",due:"",notes:"",project}] }); setTaskInput(""); };
  const viewProjectTasks = (pid) => { setTaskFilter(pid); setTab("task"); };
  const toggleExpand = (id) => setExpanded((s)=>{ const n=new Set(s); n.has(id)?n.delete(id):n.add(id); return n; });
  const clearCompleted = () => { const inScope=(t)=>!taskFilter?true:taskFilter==="__none"?!t.project:t.project===taskFilter; persist({ ...data, tasks: data.tasks.filter((t)=>!(t.done&&inScope(t))) }); setClearConfirm(false); };
  const exportJSON = () => { const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"}); const a=document.createElement("a"); a.href=window.URL.createObjectURL(blob); a.download="mission-control-"+todayStr()+".json"; a.click(); };
  const importJSON = (file) => { const r=new FileReader(); r.onload=()=>{ try{ persist(migrate(JSON.parse(r.result))); }catch(e){ alert("Could not read that file."); } }; r.readAsText(file); };

  const projSort = (a,b)=>(PSORT[a.status]??0)-(PSORT[b.status]??0)||a.name.localeCompare(b.name);
  const projects = [...data.projects].sort(projSort);
  const projectsById = Object.fromEntries(data.projects.map((p)=>[p.id,p]));
  const childrenOf = (pid)=> data.projects.filter((p)=>p.parent===pid && projectsById[p.parent]).sort(projSort);
  const isParent = (p)=> childrenOf(p.id).length>0;
  const topProjects = data.projects.filter((p)=>!p.parent || !projectsById[p.parent]).sort((a,b)=>{
    const pa=isParent(a), pb=isParent(b);
    if(pa!==pb) return pa?-1:1;          // folders first
    if(pa) return a.name.localeCompare(b.name); // both folders: by name
    return projSort(a,b);                // regular projects: by status, then name
  });
  const renderProj = (p, child) => {
    const rel = data.tasks.filter((t)=>t.project===p.id);
    const kids = child ? [] : childrenOf(p.id);
    return <ProjectRow key={p.id} p={p} child={child} hasChildren={kids.length>0} childCount={kids.length} expanded={expanded.has(p.id)} openCount={rel.filter((t)=>!t.done).length} doneCount={rel.filter((t)=>t.done).length} onToggleExpand={()=>toggleExpand(p.id)} onViewTasks={()=>viewProjectTasks(p.id)} onEdit={()=>setModal({type:"project",item:p})} onDelete={()=>confirmId===p.id?remove("project",p.id):setConfirmId(p.id)} confirming={confirmId===p.id} onCancelConfirm={()=>setConfirmId(null)} />;
  };
  const domains = [...data.domains].sort((a,b)=>domScore(b)-domScore(a));
  const obligations = [...(data.obligations||[])].sort((a,b)=>{ if(!!a.done!==!!b.done) return a.done?1:-1; if(!a.due) return 1; if(!b.due) return -1; return a.due.localeCompare(b.due); });
  const expenses = [...(data.expenses||[])].sort((a,b)=>{ if(!!a.active!==!!b.active) return a.active?-1:1; return monthlyCost(b)-monthlyCost(a); });
  const tasks = [...data.tasks].sort((a,b)=>(a.done!==b.done?(a.done?1:-1):taskUrgency(b)-taskUrgency(a)));
  const projName = (id) => (data.projects.find((p)=>p.id===id)||{}).name;
  const visibleTasks = tasks.filter((t)=>!taskFilter?true:taskFilter==="__none"?!t.project:t.project===taskFilter);
  const doneVisibleCount = visibleTasks.filter((t)=>t.done).length;

  const alerts=[];
  const odTasks=data.tasks.filter((t)=>!t.done&&t.due&&t.due<todayStr()).length;
  const todayTasks=data.tasks.filter((t)=>!t.done&&t.due===todayStr()).length;
  const expired=data.domains.filter((d)=>{const a=domainAlert(d);return a&&a.kind==="expired";}).length;
  const expiring=data.domains.filter((d)=>{const a=domainAlert(d);return a&&a.kind==="soon";}).length;
  const down=data.domains.filter((d)=>d.status==="down").length;
  if(odTasks)alerts.push({t:`${odTasks} to-do${odTasks>1?"s":""} overdue`,sev:"hi",go:"task"});
  if(expired)alerts.push({t:`${expired} domain${expired>1?"s":""} expired`,sev:"hi",go:"dom"});
  if(down)alerts.push({t:`${down} site${down>1?"s":""} down`,sev:"hi",go:"dom"});
  if(expiring)alerts.push({t:`${expiring} expiring \u226430d`,sev:"med",go:"dom"});
  if(todayTasks)alerts.push({t:`${todayTasks} due today`,sev:"med",go:"task"});
  const fin = data.finance || {};
  const runwayMonths = (fin.cash!=null && fin.burn!=null && fin.burn>0) ? fin.cash/fin.burn : null;
  const runwayColor = runwayMonths==null?"var(--dim)":runwayMonths<3?"#ff5d6c":runwayMonths<6?"#ffb24a":"#3fe0a0";
  if(runwayMonths!=null && runwayMonths<6) alerts.push({t:`runway ${runwayMonths.toFixed(1)} mo`,sev:runwayMonths<3?"hi":"med",go:"finance"});
  const obOverdue=(data.obligations||[]).filter((o)=>{const a=obligAlert(o);return a&&a.kind==="overdue";}).length;
  const obSoon=(data.obligations||[]).filter((o)=>{const a=obligAlert(o);return a&&a.kind==="soon";}).length;
  if(obOverdue)alerts.push({t:`${obOverdue} obligation${obOverdue>1?"s":""} overdue`,sev:"hi",go:"oblig"});
  if(obSoon)alerts.push({t:`${obSoon} obligation${obSoon>1?"s":""} due \u226430d`,sev:"med",go:"oblig"});
  const renewSoon=(data.expenses||[]).filter((e)=>expenseAlert(e)).length;
  const totalMonthly=(data.expenses||[]).filter((e)=>e.active).reduce((s,e)=>s+monthlyCost(e),0);
  if(renewSoon)alerts.push({t:`${renewSoon} renewal${renewSoon>1?"s":""} due \u226414d`,sev:"med",go:"spend"});

  const statSets={
    proj:[{n:data.projects.length,l:"Total",c:"#d6e2ee"},{n:data.projects.filter((p)=>p.status==="dev").length,l:"In Dev",c:PSTATUS.dev.color},{n:data.projects.filter((p)=>p.status==="live").length,l:"Live",c:PSTATUS.live.color},{n:data.projects.filter((p)=>p.status==="hold").length,l:"On Hold",c:PSTATUS.hold.color}],
    task:[{n:data.tasks.filter((t)=>!t.done).length,l:"Open",c:"#d6e2ee"},{n:todayTasks,l:"Due Today",c:"#ffb24a"},{n:odTasks,l:"Overdue",c:"#ff5d6c"},{n:data.tasks.filter((t)=>t.done).length,l:"Done",c:"#3fe0ff"}],
    dom:[{n:data.domains.length,l:"Total",c:"#d6e2ee"},{n:data.domains.filter((d)=>d.status==="live").length,l:"Live",c:DSTATUS.live.color},{n:expiring,l:"Expiring",c:"#ffb24a"},{n:expired,l:"Expired",c:"#ff5d6c"},{n:down,l:"Down",c:DSTATUS.down.color}],
    reg:[{n:data.credentials.length,l:"Entries",c:"#d6e2ee"},{n:data.credentials.filter((c)=>(c.location||"").toLowerCase().includes("roboform")).length,l:"In RoboForm",c:"#3fe0ff"},{n:data.credentials.filter((c)=>c.location&&!(c.location||"").toLowerCase().includes("roboform")).length,l:"Elsewhere",c:"#7b8aa0"},{n:data.credentials.filter((c)=>c.url).length,l:"With URL",c:"#3fe0a0"}],
    oblig:[{n:(data.obligations||[]).length,l:"Total",c:"#d6e2ee"},{n:obOverdue,l:"Overdue",c:"#ff5d6c"},{n:obSoon,l:"Due ≤30d",c:"#ffb24a"},{n:(data.obligations||[]).filter((o)=>o.cadence!=="once"&&!o.done).length,l:"Recurring",c:"#a78bfa"}],
    spend:[{n:fmtMoney(totalMonthly),l:"Per month",c:"#3fe0a0"},{n:fmtMoney(totalMonthly*12),l:"Per year",c:"#3fe0ff"},{n:(data.expenses||[]).filter((e)=>e.active).length,l:"Active vendors",c:"#a78bfa"},{n:renewSoon,l:"Renewals ≤14d",c:"#ffb24a"}],
  };

  const pad=(n)=>String(n).padStart(2,"0");
  const timeStr=`${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  const dateStr=now.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric",year:"numeric"}).toUpperCase();
  const newType={proj:"project",task:"task",dom:"domain",reg:"cred",oblig:"oblig",spend:"expense"}[tab];
  const newLabel={proj:"New Project",task:"New To-Do",dom:"New Domain",reg:"New Entry",oblig:"New Obligation",spend:"New Vendor"}[tab];

  return (
    <div className={"mc" + (theme === "light" ? " light" : "")}>
      <style>{css}</style>
      <div className="scan" />
      <header><div className="hbar">
        <div className="brand"><span className="emblem"><svg viewBox="0 0 48 48" width="44" height="44" aria-hidden="true"><polygon points="24,3 42,13.5 42,34.5 24,45 6,34.5 6,13.5" fill="none" stroke="var(--cyan)" strokeWidth="1.2"/><g className="em-ring"><polygon points="24,9 37,16.5 37,31.5 24,39 11,31.5 11,16.5" fill="none" stroke="var(--amber)" strokeWidth="1" opacity="0.5"/></g><line x1="24" y1="13" x2="24" y2="35" stroke="var(--cyan)" strokeWidth="0.7" opacity="0.35"/><line x1="13" y1="24" x2="35" y2="24" stroke="var(--cyan)" strokeWidth="0.7" opacity="0.35"/><circle className="em-core" cx="24" cy="24" r="3.6" fill="var(--cyan)"/></svg></span><span className="hdiv" /><div className="lockup"><span className="eyebrow">Innovative Blockchain Solutions</span><span className="title">Mission <b>Control</b></span><span className="subline"><span className="dot" /> Operations Console</span></div></div>
        <div className="hud-right">
          <div className="clock"><div className="t mono">{timeStr} <span style={{ color:"var(--dim)" }}>LOCAL</span></div><div>{dateStr}</div></div>
          <div className="hbtns">
            <span className={"syncind "+saveStatus} onClick={saveStatus==="error"?retrySave:undefined} title={saveStatus==="error"?"Last save failed — tap to retry":saveStatus==="saving"?"Saving…":"All changes saved"}>{saveStatus==="error"?"⚠ Save failed":saveStatus==="saving"?"⋯ Saving":"✓ Synced"}</span>
            <button className="hbtn" onClick={toggleTheme}>{theme==="dark"?"☀ Light":"☾ Dark"}</button>
            <button className="hbtn" onClick={exportJSON}>⤓ Export</button>
            <button className="hbtn" onClick={() => fileRef.current && fileRef.current.click()}>⤒ Import</button>
            <button className="hbtn" onClick={() => sb.auth.signOut()}>Sign out</button>
            <input ref={fileRef} type="file" accept="application/json" style={{ display:"none" }} onChange={(e) => e.target.files[0] && importJSON(e.target.files[0])} />
          </div>
        </div>
      </div></header>

      <div className="wrap">
        {!loading && (
          <div className="alerts"><span className="lab">Attention</span>
            {alerts.length===0 ? <span className="nominal">◇ ALL SYSTEMS NOMINAL</span> : alerts.map((a,i)=>(
              <button key={i} className="chip" onClick={()=>{ if(a.go==="finance"){ setModal({type:"finance",item:data.finance}); return; } if(a.go==="task")setTaskFilter(""); setTab(a.go); }} style={{color:"#ff8593",borderColor:"rgba(255,93,108,.45)",background:"rgba(255,93,108,.1)"}}>{a.sev==="hi"?"▲":"◆"} {a.t}</button>
            ))}
          </div>
        )}
        {!loading && (
          <div className="runway" onClick={()=>setModal({type:"finance",item:data.finance})}>
            <div className="rw-main"><span className="rw-lab">Runway</span><span className="rw-val" style={{ color:runwayColor }}>{runwayMonths!=null?runwayMonths.toFixed(1):"—"}<span className="rw-unit">mo</span></span></div>
            <div className="rw-sub">
              <div><span className="rw-k">Cash on hand</span><span className="rw-v">{fmtMoney(fin.cash)}</span></div>
              <div><span className="rw-k">Monthly burn</span><span className="rw-v">{fmtMoney(fin.burn)}</span></div>
              <div><span className="rw-k">As of</span><span className="rw-v">{fin.updated?fmtDate(fin.updated):"not set"}</span></div>
            </div>
            <button className="rw-edit" title="Update figures">✎</button>
          </div>
        )}
        <div className="stats">{statSets[tab].map((s,i)=>(<div className="stat" key={i} style={{ "--c":s.c }}><div className="n">{s.n}</div><div className="l">{s.l}</div></div>))}</div>
        <div className="bar">
          <div className="tabs">
            <button className={`tab ${tab==="proj"?"active":""}`} onClick={()=>setTab("proj")}><span className="ic">▦</span>Projects <span className="c">{data.projects.length}</span></button>
            <button className={`tab ${tab==="task"?"active":""}`} onClick={()=>setTab("task")}><span className="ic">✓</span>To-Dos <span className="c">{data.tasks.filter((t)=>!t.done).length}</span></button>
            <button className={`tab ${tab==="dom"?"active":""}`} onClick={()=>setTab("dom")}><span className="ic">◎</span>Domains <span className="c">{data.domains.length}</span></button>
            <button className={`tab ${tab==="oblig"?"active":""}`} onClick={()=>setTab("oblig")}><span className="ic">⚖</span>Compliance <span className="c">{(data.obligations||[]).length}</span></button>
            <button className={`tab ${tab==="spend"?"active":""}`} onClick={()=>setTab("spend")}><span className="ic">$</span>Spend <span className="c">{(data.expenses||[]).length}</span></button>
            <button className={`tab ${tab==="reg"?"active":""}`} onClick={()=>setTab("reg")}><span className="ic">🗝</span>Registry <span className="c">{data.credentials.length}</span></button>
          </div>
          <button className="add" onClick={()=>setModal({type:newType,item:null})}>+ {newLabel}</button>
        </div>

        {loading ? <div className="empty"><p>· · · SYNCING · · ·</p></div>
        : tab==="proj" ? (projects.length===0 ? <div className="empty"><p>NO PROJECTS YET</p><button className="add" onClick={()=>setModal({type:"project",item:null})}>+ Add First Project</button></div>
          : <div className="list">{topProjects.map((p)=>{ const kids=childrenOf(p.id); return <React.Fragment key={p.id}>{renderProj(p,false)}{expanded.has(p.id) && kids.map((k)=>renderProj(k,true))}</React.Fragment>; })}</div>)
        : tab==="task" ? (<>
            <div className="qarow"><input value={taskInput} onChange={(e)=>setTaskInput(e.target.value)} onKeyDown={(e)=>e.key==="Enter"&&addQuickTask()} placeholder={taskFilter&&taskFilter!=="__none"?`Quick add to "${projName(taskFilter)}" — Enter`:"Quick capture a to-do — type and hit Enter"} /><button className="add" onClick={addQuickTask}>Add</button></div>
            <div className="tfilter"><select value={taskFilter} onChange={(e)=>{setTaskFilter(e.target.value);setClearConfirm(false);}}><option value="">All to-dos</option><option value="__none">Unassigned</option>{data.projects.map((p)=><option key={p.id} value={p.id}>{p.name}</option>)}</select>{doneVisibleCount>0 && <button className={`mini ${clearConfirm?"confirm":""}`} onClick={()=>clearConfirm?clearCompleted():setClearConfirm(true)}>{clearConfirm?`Confirm — clear ${doneVisibleCount}?`:`Clear completed (${doneVisibleCount})`}</button>}</div>
            {visibleTasks.length===0 ? <div className="empty"><p>{taskFilter?"NOTHING HERE — CAPTURE ONE ABOVE":"NO TO-DOS — CAPTURE ONE ABOVE"}</p></div>
              : <div className="grid-list">{visibleTasks.map((t,i)=>(<TaskRow key={t.id} t={t} i={i} projectName={projName(t.project)} onToggle={()=>toggleTask(t.id)} onEdit={()=>setModal({type:"task",item:t})} onDelete={()=>confirmId===t.id?remove("task",t.id):setConfirmId(t.id)} confirming={confirmId===t.id} onCancelConfirm={()=>setConfirmId(null)} />))}</div>}
          </>)
        : tab==="dom" ? (domains.length===0 ? <div className="empty"><p>NO DOMAINS REGISTERED</p><button className="add" onClick={()=>setModal({type:"domain",item:null})}>+ Add First Domain</button></div>
          : <div className="list">{domains.map((d,i)=>(<DomainRow key={d.id} d={d} onEdit={()=>setModal({type:"domain",item:d})} onDelete={()=>confirmId===d.id?remove("domain",d.id):setConfirmId(d.id)} confirming={confirmId===d.id} onCancelConfirm={()=>setConfirmId(null)} />))}</div>)
        : tab==="oblig" ? (obligations.length===0 ? <div className="empty"><p>NO OBLIGATIONS TRACKED</p><button className="add" onClick={()=>setModal({type:"oblig",item:null})}>+ Add First Obligation</button></div>
          : <div className="list">{obligations.map((o)=>(<ObligationRow key={o.id} o={o} onComplete={()=>completeObligation(o.id)} onReopen={()=>reopenObligation(o.id)} onEdit={()=>setModal({type:"oblig",item:o})} onDelete={()=>confirmId===o.id?remove("oblig",o.id):setConfirmId(o.id)} confirming={confirmId===o.id} onCancelConfirm={()=>setConfirmId(null)} />))}</div>)
        : tab==="spend" ? (<>
            <div className="note"><span>💳</span><span><b>Tracked vendor & SaaS spend — {fmtMoney(totalMonthly)}/mo ({fmtMoney(totalMonthly*12)}/yr).</b> This is a component of your total burn, not the whole thing. Pause anything you cancel rather than deleting it, to keep the record.</span></div>
            {expenses.length===0 ? <div className="empty"><p>NO VENDORS TRACKED</p><button className="add" onClick={()=>setModal({type:"expense",item:null})}>+ Add First Vendor</button></div>
              : <div className="list">{expenses.map((e)=>(<ExpenseRow key={e.id} e={e} onPause={()=>toggleExpense(e.id)} onResume={()=>toggleExpense(e.id)} onEdit={()=>setModal({type:"expense",item:e})} onDelete={()=>confirmId===e.id?remove("expense",e.id):setConfirmId(e.id)} confirming={confirmId===e.id} onCancelConfirm={()=>setConfirmId(null)} />))}</div>}
          </>)
        : (<>
            <div className="note"><span>🔒</span><span><b>References only — no secrets stored here.</b> This logs which service, the account, and where the real password/key lives. Keep actual secrets in RoboForm.</span></div>
            {data.credentials.length===0 ? <div className="empty"><p>NO REGISTRY ENTRIES</p><button className="add" onClick={()=>setModal({type:"cred",item:null})}>+ Add First Entry</button></div>
              : <div className="list">{data.credentials.map((c,i)=>(<CredRow key={c.id} c={c} onEdit={()=>setModal({type:"cred",item:c})} onDelete={()=>confirmId===c.id?remove("cred",c.id):setConfirmId(c.id)} confirming={confirmId===c.id} onCancelConfirm={()=>setConfirmId(null)} />))}</div>}
          </>)}

        <div className="sync">● <span className="ok">SYNCED TO SUPABASE</span> — {session.user.email}{savedAt?" · last write "+new Date(savedAt).toLocaleTimeString():""}</div>
      </div>

      {modal && <Editor type={modal.type} item={modal.item} projects={data.projects} onClose={()=>setModal(null)} onSave={(it)=>saveItem(modal.type,it)} />}
    </div>
  );
}

function ProjectRow({ p, openCount, doneCount, child, hasChildren, childCount, expanded, onToggleExpand, onViewTasks, onEdit, onDelete, confirming, onCancelConfirm }) {
  const st = PSTATUS[p.status] || PSTATUS.dev;
  return (<div className={"lrow"+(child?" child":"")+(hasChildren?" folder":"")}>
    {hasChildren ? <button className="caret" onClick={onToggleExpand} title={expanded?"Collapse":"Expand"}>{expanded?"▾":"▸"}</button> : <span className="cstub">{child?"↳":""}</span>}
    <span className="lname">{p.name}</span>
    {hasChildren && <span className="subcount" onClick={onToggleExpand}>{childCount} sub</span>}
    <span className="lmeta">{p.notes||""}</span>
    {(openCount+doneCount)>0 && <span className="lcount" onClick={onViewTasks} title="View to-dos">{openCount} open</span>}
    {!hasChildren && <span className="lstat" style={{ color:st.color, background:st.color+"1c", border:`1px solid ${st.color}3a` }}>{st.glyph} {st.label}</span>}
    {(p.links||[]).length>0 && <span className="llinks">{p.links.map((lk,idx)=>(<a key={idx} className="lchip" href={lk.url} target="_blank" rel="noreferrer" title={lk.url}>↗ {lk.label||hostOf(lk.url)}</a>))}</span>}
    <RowActions onEdit={onEdit} onDelete={onDelete} confirming={confirming} onCancelConfirm={onCancelConfirm} />
  </div>);
}
function TaskRow({ t, i, projectName, onToggle, onEdit, onDelete, confirming, onCancelConfirm }) {
  const pr = PRIORITY[t.priority] || PRIORITY.low;
  const overdue = !t.done && t.due && t.due < todayStr(); const isToday = !t.done && t.due === todayStr();
  return (<div className={`task ${t.done?"done":""} ${overdue?"flag":""}`} style={{ animationDelay:`${i*35}ms` }}>
    <button className={`check ${t.done?"on":""}`} onClick={onToggle}>{t.done?"✓":""}</button>
    <div className="tbody"><div className="ttext">{t.text}</div><div className="tmeta"><span className="tdot" style={{ background:pr.color, color:pr.color }} />{t.due && <span className={`tdue ${overdue?"od":isToday?"today":""}`}>{overdue?"OVERDUE · "+fmtDate(t.due):isToday?"TODAY":fmtDate(t.due)}</span>}{projectName && <span className="tchip">◇ {projectName}</span>}</div></div>
    <div className="tacts"><button className="mini" onClick={onEdit}>Edit</button><button className={`mini del ${confirming?"confirm":""}`} onClick={onDelete}>{confirming?"Confirm?":"Del"}</button>{confirming && <button className="mini" onClick={onCancelConfirm}>Cancel</button>}</div>
  </div>);
}
function DomainRow({ d, onEdit, onDelete, confirming, onCancelConfirm }) {
  const st = DSTATUS[d.status] || DSTATUS.parked; const alert = domainAlert(d);
  return (<div className={"lrow"+(alert?" flag":"")}>
    <span className="lname">{d.name}</span>
    <span className="lmeta">{[d.purpose, d.registrar].filter(Boolean).join("  ·  ")}</span>
    {alert && alert.kind==="expired" && <span className="over">EXPIRED</span>}
    {alert && alert.kind==="soon" && <span className="over soon">{alert.days===0?"TODAY":`${alert.days}d`}</span>}
    <span className="lstat" style={{ color:st.color, background:st.color+"1c", border:`1px solid ${st.color}3a` }}>{st.glyph} {st.label}</span>
    <RowActions link={d.link} onEdit={onEdit} onDelete={onDelete} confirming={confirming} onCancelConfirm={onCancelConfirm} />
  </div>);
}
function CredRow({ c, onEdit, onDelete, confirming, onCancelConfirm }) {
  return (<div className="lrow">
    <span className="lname">{c.service}</span>
    <span className="lmeta mono">{c.account||""}</span>
    {c.location && <span className="lstat" style={{ color:"#3fe0ff", background:"rgba(63,224,255,.16)", border:"1px solid rgba(63,224,255,.32)" }}>🗝 {c.location}</span>}
    <RowActions link={c.url} linkTitle="Open login" onEdit={onEdit} onDelete={onDelete} confirming={confirming} onCancelConfirm={onCancelConfirm} />
  </div>);
}
function ObligationRow({ o, onComplete, onReopen, onEdit, onDelete, confirming, onCancelConfirm }) {
  const cat = OCATEGORY[o.category] || OCATEGORY.other; const cad = OCADENCE[o.cadence] || OCADENCE.annual; const alert = obligAlert(o);
  const meta = [o.owner, cad.label].filter(Boolean).join("  ·  ");
  return (<div className={"lrow"+(alert?" flag":"")+(o.done?" odone":"")}>
    <span className="lname">{o.name}</span>
    <span className="lmeta">{meta}</span>
    {o.due && <span className={"odue "+(o.done?"":alert?alert.kind:"")}>{o.done?"✓ Done":alert&&alert.kind==="overdue"?"OVERDUE · "+fmtDate(o.due):alert&&alert.kind==="soon"?(alert.days===0?"TODAY":alert.days+"d")+" · "+fmtDate(o.due):fmtDate(o.due)}</span>}
    <span className="lstat" style={{ color:cat.color, background:cat.color+"1c", border:`1px solid ${cat.color}3a` }}>{cat.label}</span>
    <RowActions link={o.link} linkTitle="Open filing / doc" onComplete={onComplete} onReopen={onReopen} done={o.done} onEdit={onEdit} onDelete={onDelete} confirming={confirming} onCancelConfirm={onCancelConfirm} />
  </div>);
}
function ExpenseRow({ e, onPause, onResume, onEdit, onDelete, confirming, onCancelConfirm }) {
  const cat = ECATEGORY[e.category] || ECATEGORY.other; const alert = expenseAlert(e);
  const shortCad = { monthly:"mo", quarterly:"qtr", annual:"yr" }[e.cadence] || "mo";
  const meta = [e.owner, (e.cadence!=="monthly"&&e.amount)?fmtMoney(e.amount)+"/"+shortCad:""].filter(Boolean).join("  ·  ");
  return (<div className={"lrow"+(alert?" flag":"")+(!e.active?" paused":"")}>
    <span className="lname">{e.vendor}</span>
    <span className="lmeta">{meta}</span>
    {alert && <span className="odue soon">renews {alert.days===0?"today":"in "+alert.days+"d"}</span>}
    <span className="ecost">{fmtMoney(monthlyCost(e))}<span className="ecost-u">/mo</span></span>
    <span className="lstat" style={{ color:cat.color, background:cat.color+"1c", border:`1px solid ${cat.color}3a` }}>{cat.label}</span>
    <RowActions link={e.link} linkTitle="Open billing" onPause={onPause} onResume={onResume} paused={!e.active} onEdit={onEdit} onDelete={onDelete} confirming={confirming} onCancelConfirm={onCancelConfirm} />
  </div>);
}
function RowActions({ link, linkTitle, onEdit, onDelete, confirming, onCancelConfirm, onComplete, onReopen, done, onPause, onResume, paused }) {
  return (<div className="lacts">
    {link && <a className="iconbtn" href={link} target="_blank" rel="noreferrer" title={linkTitle||"Open"}>↗</a>}
    {onComplete && !done && !confirming && <button className="iconbtn done" onClick={onComplete} title="Mark done — advances recurring to next cycle">✓</button>}
    {onReopen && done && !confirming && <button className="iconbtn" onClick={onReopen} title="Reopen">↺</button>}
    {onPause && !paused && !confirming && <button className="iconbtn" onClick={onPause} title="Pause — exclude from spend total">⏸</button>}
    {onResume && paused && !confirming && <button className="iconbtn done" onClick={onResume} title="Resume — count toward spend">▶</button>}
    {confirming
      ? (<><button className="iconbtn confirm" onClick={onDelete} title="Confirm delete">Delete?</button><button className="iconbtn" onClick={onCancelConfirm} title="Cancel">↩</button></>)
      : (<><button className="iconbtn" onClick={onEdit} title="Edit">✎</button><button className="iconbtn del" onClick={onDelete} title="Delete">✕</button></>)}
  </div>);
}

function Editor({ type, item, projects, onClose, onSave }) {
  const blank = {
    project:{ id:uid(), name:"", status:"dev", notes:"", links:[], parent:"" },
    task:{ id:uid(), text:"", done:false, priority:"medium", due:"", notes:"", project:"" },
    domain:{ id:uid(), name:"", purpose:"", registrar:"", host:"", expiry:"", status:"live", link:"", notes:"" },
    cred:{ id:uid(), service:"", account:"", location:"RoboForm", url:"", notes:"" },
    finance:{ cash:"", burn:"", updated:todayStr() },
    oblig:{ id:uid(), name:"", category:"regulatory", cadence:"annual", due:"", owner:"", link:"", notes:"", done:false, lastCompleted:"" },
    expense:{ id:uid(), vendor:"", category:"saas", amount:"", cadence:"monthly", renewal:"", owner:"", link:"", notes:"", active:true },
  };
  const [f, setF] = useState(item ? { ...item } : blank[type]);
  const set = (k,v) => setF((p)=>({ ...p, [k]:v }));
  const valid = type==="project"?f.name.trim():type==="task"?f.text.trim():type==="domain"?f.name.trim():type==="cred"?f.service.trim():type==="oblig"?f.name.trim():type==="expense"?f.vendor.trim():true;
  const heading = { project:"Project", task:"To-Do", domain:"Domain / Site", cred:"Registry Entry", finance:"Financials", oblig:"Obligation", expense:"Vendor / Subscription" }[type];
  return (<div className="scrim" onClick={onClose}><div className="modal" onClick={(e)=>e.stopPropagation()}>
    <h2>{item?"Edit":"New"} {heading}</h2>
    {type==="project"&&(<><div className="field"><label>Project Name</label><input value={f.name} onChange={(e)=>set("name",e.target.value)} placeholder="e.g. Series A raise" autoFocus /></div>
      <div className="field"><label>Status</label><select value={f.status} onChange={(e)=>set("status",e.target.value)}>{PSTATUS_ORDER.map((k)=><option key={k} value={k}>{PSTATUS[k].label}</option>)}</select></div>
      <div className="field"><label>Where it stands</label><textarea value={f.notes} onChange={(e)=>set("notes",e.target.value)} placeholder="A line or two on the current state" /></div>
      <div className="field"><label>Parent project (optional)</label><select value={f.parent||""} onChange={(e)=>set("parent",e.target.value)}><option value="">— None (top level) —</option>{projects.filter((x)=>x.id!==f.id && !x.parent).map((x)=><option key={x.id} value={x.id}>{x.name}</option>)}</select></div>
      <div className="field"><label>Links</label>
        {(f.links||[]).map((lk,idx)=>(<div className="linkrow" key={idx}>
          <input className="lk-label" value={lk.label} onChange={(e)=>set("links",(f.links||[]).map((x,j)=>j===idx?{...x,label:e.target.value}:x))} placeholder="Label" />
          <input className="lk-url" value={lk.url} onChange={(e)=>set("links",(f.links||[]).map((x,j)=>j===idx?{...x,url:e.target.value}:x))} placeholder="https://" />
          <button type="button" className="lk-del" onClick={()=>set("links",(f.links||[]).filter((_,j)=>j!==idx))} title="Remove link">✕</button>
        </div>))}
        <button type="button" className="lk-add" onClick={()=>set("links",[...(f.links||[]),{label:"",url:""}])}>+ Add link</button>
      </div></>)}
    {type==="task"&&(<><div className="field"><label>To-Do</label><input value={f.text} onChange={(e)=>set("text",e.target.value)} placeholder="What needs doing?" autoFocus /></div>
      <div className="two"><div className="field"><label>Priority</label><select value={f.priority} onChange={(e)=>set("priority",e.target.value)}>{PRIORITY_ORDER.map((k)=><option key={k} value={k}>{PRIORITY[k].label} — {k}</option>)}</select></div><div className="field"><label>Due</label><input type="date" value={f.due} onChange={(e)=>set("due",e.target.value)} onClick={(e)=>{try{e.currentTarget.showPicker&&e.currentTarget.showPicker();}catch(_){}}} /></div></div>
      <div className="field"><label>Project (optional)</label><select value={f.project} onChange={(e)=>set("project",e.target.value)}><option value="">— None —</option>{projects.map((p)=><option key={p.id} value={p.id}>{p.name}</option>)}</select></div>
      <div className="field"><label>Notes</label><textarea value={f.notes} onChange={(e)=>set("notes",e.target.value)} /></div></>)}
    {type==="domain"&&(<><div className="field"><label>Domain / Site</label><input value={f.name} onChange={(e)=>set("name",e.target.value)} placeholder="e.g. app.groundworkhq.com" autoFocus /></div>
      <div className="field"><label>Purpose</label><input value={f.purpose} onChange={(e)=>set("purpose",e.target.value)} placeholder="e.g. Production app" /></div>
      <div className="two"><div className="field"><label>Registrar</label><input value={f.registrar} onChange={(e)=>set("registrar",e.target.value)} placeholder="e.g. Cloudflare" /></div><div className="field"><label>Host / Deploy</label><input value={f.host} onChange={(e)=>set("host",e.target.value)} placeholder="e.g. Vercel, AWS" /></div></div>
      <div className="two"><div className="field"><label>Status</label><select value={f.status} onChange={(e)=>set("status",e.target.value)}>{DSTATUS_ORDER.map((k)=><option key={k} value={k}>{DSTATUS[k].label}</option>)}</select></div><div className="field"><label>Expiry / Renewal</label><input type="date" value={f.expiry} onChange={(e)=>set("expiry",e.target.value)} onClick={(e)=>{try{e.currentTarget.showPicker&&e.currentTarget.showPicker();}catch(_){}}} /></div></div>
      <div className="field"><label>Link</label><input value={f.link} onChange={(e)=>set("link",e.target.value)} placeholder="https://" /></div>
      <div className="field"><label>Notes</label><textarea value={f.notes} onChange={(e)=>set("notes",e.target.value)} placeholder="DNS, SSL, owner, etc." /></div></>)}
    {type==="cred"&&(<><div className="field"><label>Service</label><input value={f.service} onChange={(e)=>set("service",e.target.value)} placeholder="e.g. GitHub, Stripe, AWS" autoFocus /></div>
      <div className="field"><label>Account / Username</label><input value={f.account} onChange={(e)=>set("account",e.target.value)} placeholder="email or handle" /></div>
      <div className="field"><label>Where the secret lives</label><input value={f.location} onChange={(e)=>set("location",e.target.value)} placeholder="e.g. RoboForm, .env file" /></div>
      <div className="field"><label>URL</label><input value={f.url} onChange={(e)=>set("url",e.target.value)} placeholder="https://" /></div>
      <div className="field"><label>Notes</label><textarea value={f.notes} onChange={(e)=>set("notes",e.target.value)} placeholder="MFA method, rotation date, etc." /></div></>)}
    {type==="finance"&&(<><div className="field"><label>Cash on hand (USD)</label><input type="number" value={f.cash??""} onChange={(e)=>set("cash",e.target.value)} placeholder="e.g. 850000" autoFocus /></div>
      <div className="field"><label>Net monthly burn (USD)</label><input type="number" value={f.burn??""} onChange={(e)=>set("burn",e.target.value)} placeholder="e.g. 60000" /></div>
      <div className="field"><label>As of date</label><input type="date" value={f.updated||""} onChange={(e)=>set("updated",e.target.value)} onClick={(e)=>{try{e.currentTarget.showPicker&&e.currentTarget.showPicker();}catch(_){}}} /></div>
      <p className="hint">Runway = cash ÷ monthly burn. Burn should be your net monthly cash outflow. Update whenever the figures change.</p></>)}
    {type==="oblig"&&(<><div className="field"><label>Obligation</label><input value={f.name} onChange={(e)=>set("name",e.target.value)} placeholder="e.g. SOC 2 surveillance audit" autoFocus /></div>
      <div className="two"><div className="field"><label>Category</label><select value={f.category} onChange={(e)=>set("category",e.target.value)}>{OCATEGORY_ORDER.map((k)=><option key={k} value={k}>{OCATEGORY[k].label}</option>)}</select></div><div className="field"><label>Cadence</label><select value={f.cadence} onChange={(e)=>set("cadence",e.target.value)}>{OCADENCE_ORDER.map((k)=><option key={k} value={k}>{OCADENCE[k].label}</option>)}</select></div></div>
      <div className="two"><div className="field"><label>Next due</label><input type="date" value={f.due} onChange={(e)=>set("due",e.target.value)} onClick={(e)=>{try{e.currentTarget.showPicker&&e.currentTarget.showPicker();}catch(_){}}} /></div><div className="field"><label>Owner</label><input value={f.owner} onChange={(e)=>set("owner",e.target.value)} placeholder="Who's responsible" /></div></div>
      <div className="field"><label>Link (filing portal, doc)</label><input value={f.link} onChange={(e)=>set("link",e.target.value)} placeholder="https://" /></div>
      <div className="field"><label>Notes</label><textarea value={f.notes} onChange={(e)=>set("notes",e.target.value)} placeholder="Filing details, reference numbers, etc." /></div>
      {f.lastCompleted && <p className="hint">Last completed {fmtDate(f.lastCompleted)}. Marking done advances the next due date by the cadence.</p>}</>)}
    {type==="expense"&&(<><div className="field"><label>Vendor / Service</label><input value={f.vendor} onChange={(e)=>set("vendor",e.target.value)} placeholder="e.g. AWS, Notion, Figma" autoFocus /></div>
      <div className="two"><div className="field"><label>Category</label><select value={f.category} onChange={(e)=>set("category",e.target.value)}>{ECATEGORY_ORDER.map((k)=><option key={k} value={k}>{ECATEGORY[k].label}</option>)}</select></div><div className="field"><label>Billing cadence</label><select value={f.cadence} onChange={(e)=>set("cadence",e.target.value)}>{ECADENCE_ORDER.map((k)=><option key={k} value={k}>{ECADENCE[k].label}</option>)}</select></div></div>
      <div className="two"><div className="field"><label>Amount per cycle (USD)</label><input type="number" value={f.amount??""} onChange={(e)=>set("amount",e.target.value)} placeholder="e.g. 1200" /></div><div className="field"><label>Next renewal (optional)</label><input type="date" value={f.renewal} onChange={(e)=>set("renewal",e.target.value)} onClick={(ev)=>{try{ev.currentTarget.showPicker&&ev.currentTarget.showPicker();}catch(_){}}} /></div></div>
      <div className="field"><label>Owner</label><input value={f.owner} onChange={(e)=>set("owner",e.target.value)} placeholder="Team or person" /></div>
      <div className="field"><label>Billing link (optional)</label><input value={f.link} onChange={(e)=>set("link",e.target.value)} placeholder="https://" /></div>
      <div className="field"><label>Notes</label><textarea value={f.notes} onChange={(e)=>set("notes",e.target.value)} placeholder="Plan, seats, contract terms, etc." /></div>
      <label className="chk"><input type="checkbox" checked={f.active!==false} onChange={(e)=>set("active",e.target.checked)} /> Active — counts toward monthly spend</label>
      {f.amount && <p className="hint">Normalizes to {fmtMoney((+f.amount||0)/((ECADENCE[f.cadence]||ECADENCE.monthly).per))}/mo.</p>}</>)}
    <div className="mfoot"><button className="btn ghost" onClick={onClose}>Cancel</button><button className="btn go" disabled={!valid} style={{ opacity:valid?1:0.4, width:"auto" }} onClick={()=>valid&&onSave(f)}>{item?"Save":"Add"}</button></div>
  </div></div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
